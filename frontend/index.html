<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RECAP — AI Meeting Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#181613;
    --bg-raised:#211e19;
    --line:#3a352c;
    --amber:#e8a33d;
    --amber-dim:#7a5a2c;
    --teal:#5fb3a3;
    --ink:#efe9dd;
    --ink-dim:#9c9587;
    --error:#d9685c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    min-height:100vh;
  }
  .display{ font-family:'Fraunces', serif; }

  .wrap{ max-width:880px; margin:0 auto; padding:48px 24px 96px; }

  header{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:36px; border-bottom:1px solid var(--line); padding-bottom:20px;}
  header h1{ font-size:28px; font-weight:600; margin:0; letter-spacing:-0.01em;}
  header h1 span{ color:var(--amber);}
  header .tag{ color:var(--ink-dim); font-size:12px; letter-spacing:0.08em; text-transform:uppercase;}

  .panel{ background:var(--bg-raised); border:1px solid var(--line); border-radius:10px; padding:24px; margin-bottom:20px;}
  .panel h2{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink-dim); margin:0 0 16px;}

  label{ display:block; font-size:12px; color:var(--ink-dim); margin-bottom:6px; text-transform:uppercase; letter-spacing:0.05em;}
  input[type=text], select{
    width:100%; background:#0f0e0c; border:1px solid var(--line); color:var(--ink);
    padding:11px 12px; border-radius:6px; font-family:inherit; font-size:14px; margin-bottom:16px;
  }
  input[type=text]:focus, select:focus{ outline:none; border-color:var(--amber);}

  .row{ display:flex; gap:16px; }
  .row > div{ flex:1; }

  button{
    font-family:'Fraunces', serif; font-weight:600; font-size:14px;
    background:var(--amber); color:#1a1410; border:none; border-radius:6px;
    padding:12px 22px; cursor:pointer; letter-spacing:0.01em;
  }
  button:disabled{ background:var(--amber-dim); cursor:not-allowed; color:#2a241c;}
  button:hover:not(:disabled){ filter:brightness(1.08); }
  button.ghost{ background:transparent; border:1px solid var(--line); color:var(--ink); }

  .tab-btn{ background:transparent; border:1px solid var(--line); color:var(--ink-dim); padding:9px 16px; font-size:13px; border-radius:6px; }
  .tab-btn.active{ background:var(--amber); color:#1a1410; border-color:var(--amber); }
  input[type=file]{ width:100%; background:#0f0e0c; border:1px solid var(--line); color:var(--ink); padding:10px 12px; border-radius:6px; font-family:inherit; font-size:13px; margin-bottom:16px; }

  /* --- reel / stage progress: signature element --- */
  .reel{ display:flex; align-items:center; gap:0; margin:20px 0 4px; }
  .reel .stage{ flex:1; position:relative; padding-top:18px; }
  .reel .stage .bar{ height:3px; background:var(--line); border-radius:2px; position:relative; overflow:hidden;}
  .reel .stage .bar::after{ content:""; position:absolute; inset:0; background:var(--amber); width:0%; transition:width .4s ease; }
  .reel .stage.active .bar::after{ width:60%; animation:pulse 1.3s ease-in-out infinite; }
  .reel .stage.done .bar::after{ width:100%; animation:none; }
  .reel .stage.error .bar::after{ width:100%; background:var(--error); animation:none;}
  .reel .stage .lbl{ position:absolute; top:-2px; left:0; font-size:10px; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-dim);}
  .reel .stage.active .lbl, .reel .stage.done .lbl{ color:var(--ink); }
  @keyframes pulse{ 0%{width:30%;} 50%{width:75%;} 100%{width:30%;} }

  .status-line{ font-size:12px; color:var(--ink-dim); margin-top:14px; }
  .status-line.error{ color:var(--error); }

  .result-title{ font-family:'Fraunces',serif; font-size:22px; font-weight:600; margin:0 0 4px;}
  .result-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .result-grid .panel{ margin-bottom:0; }
  ul.extract{ margin:0; padding-left:18px; font-size:13px; line-height:1.6; color:var(--ink);}
  .transcript-box{ max-height:220px; overflow-y:auto; font-size:12.5px; line-height:1.6; color:var(--ink-dim); white-space:pre-wrap; background:#0f0e0c; border-radius:6px; padding:14px; border:1px solid var(--line);}

  .chat-log{ display:flex; flex-direction:column; gap:10px; margin-bottom:14px; max-height:340px; overflow-y:auto; }
  .msg{ padding:10px 13px; border-radius:8px; font-size:13.5px; line-height:1.5; max-width:85%; }
  .msg.user{ background:#2a2620; align-self:flex-end; border:1px solid var(--line); }
  .msg.assistant{ background:#15231f; align-self:flex-start; border:1px solid #2a4a40; color:#dceee8; }
  .chat-input-row{ display:flex; gap:10px; }
  .chat-input-row input{ margin-bottom:0; }

  .hidden{ display:none !important; }
  .dim-note{ font-size:11px; color:var(--ink-dim); margin-top:-6px; margin-bottom:14px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <h1><span>RECAP</span> — AI Meeting Assistant</h1>
    <div class="tag">transcribe · summarize · decide</div>
  </header>

  <section class="panel" id="intake-panel">
    <h2>Source</h2>

    <div class="row" style="margin-bottom:16px;">
      <button type="button" class="tab-btn active" id="tab-yt" onclick="switchTab('yt')">YouTube URL</button>
      <button type="button" class="tab-btn" id="tab-file" onclick="switchTab('file')">Upload file</button>
    </div>

    <div id="yt-input-block">
      <label for="source">YouTube URL</label>
      <input type="text" id="source" placeholder="https://youtube.com/watch?v=..." />
    </div>

    <div id="file-input-block" class="hidden">
      <label for="file-input">Audio or video file</label>
      <input type="file" id="file-input" accept="audio/*,video/*" />
    </div>

    <div class="row">
      <div>
        <label for="language">Language</label>
        <select id="language">
          <option value="english">English</option>
          <option value="hinglish">Hinglish</option>
        </select>
      </div>
      <div style="display:flex; align-items:flex-end;">
        <button id="run-btn" onclick="startJob()">Run pipeline</button>
      </div>
    </div>
    <div class="dim-note">Talks to your local FastAPI backend at <code>http://localhost:8000</code>.</div>
  </section>

  <section class="panel hidden" id="progress-panel">
    <h2>Processing</h2>
    <div class="reel" id="reel"></div>
    <div class="status-line" id="status-line">Queued…</div>
  </section>

  <section class="panel hidden" id="results-panel">
    <h2>Meeting summary</h2>
    <div class="result-title" id="result-title"></div>
    <div class="panel" style="margin-top:14px;">
      <h2>Summary</h2>
      <div id="result-summary" style="font-size:13.5px; line-height:1.6;"></div>
    </div>
    <div class="result-grid" style="margin-top:16px;">
      <div class="panel">
        <h2>Action items</h2>
        <ul class="extract" id="result-actions"></ul>
      </div>
      <div class="panel">
        <h2>Key decisions</h2>
        <ul class="extract" id="result-decisions"></ul>
      </div>
    </div>
    <div class="panel" style="margin-top:16px;">
      <h2>Open questions</h2>
      <ul class="extract" id="result-questions"></ul>
    </div>
    <div class="panel" style="margin-top:16px;">
      <h2>Transcript</h2>
      <div class="transcript-box" id="result-transcript"></div>
    </div>
  </section>

  <section class="panel hidden" id="chat-panel">
    <h2>Ask about this meeting</h2>
    <div class="chat-log" id="chat-log"></div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Ask about decisions, owners, deadlines…" onkeydown="if(event.key==='Enter') sendChat()" />
      <button onclick="sendChat()">Ask</button>
    </div>
  </section>

</div>

<script>
const API_BASE = "http://localhost:8000";
const STAGES = [
  {key:"queued", label:"Queued"},
  {key:"fetching_audio", label:"Fetch"},
  {key:"transcribing", label:"Transcribe"},
  {key:"summarizing", label:"Summarize"},
  {key:"extracting", label:"Extract"},
  {key:"indexing", label:"Index"},
];

let meetingId = null;
let pollTimer = null;

function renderReel(currentStatus){
  const reel = document.getElementById("reel");
  reel.innerHTML = "";
  const currentIdx = STAGES.findIndex(s => s.key === currentStatus);
  const isError = currentStatus === "error";
  const isDone = currentStatus === "done";

  STAGES.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "stage";
    if (isDone || i < currentIdx) div.classList.add("done");
    else if (i === currentIdx) div.classList.add(isError ? "error" : "active");
    div.innerHTML = `<div class="lbl">${s.label}</div><div class="bar"></div>`;
    reel.appendChild(div);
  });
  if (isDone) {
    reel.querySelectorAll(".stage").forEach(el => el.classList.add("done"));
  }
}

let activeTab = "yt";

function switchTab(tab){
  activeTab = tab;
  document.getElementById("tab-yt").classList.toggle("active", tab === "yt");
  document.getElementById("tab-file").classList.toggle("active", tab === "file");
  document.getElementById("yt-input-block").classList.toggle("hidden", tab !== "yt");
  document.getElementById("file-input-block").classList.toggle("hidden", tab !== "file");
}

async function startJob(){
  const language = document.getElementById("language").value;

  document.getElementById("run-btn").disabled = true;
  document.getElementById("progress-panel").classList.remove("hidden");
  document.getElementById("results-panel").classList.add("hidden");
  document.getElementById("chat-panel").classList.add("hidden");
  document.getElementById("status-line").textContent = "Queued…";
  document.getElementById("status-line").classList.remove("error");
  renderReel("queued");

  try {
    let res;
    if (activeTab === "yt") {
      const source = document.getElementById("source").value.trim();
      if (!source){ alert("Enter a YouTube URL first."); throw new Error("no source"); }
      res = await fetch(`${API_BASE}/meetings`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({source, language})
      });
    } else {
      const fileInput = document.getElementById("file-input");
      const file = fileInput.files[0];
      if (!file){ alert("Choose a file first."); throw new Error("no file"); }
      const formData = new FormData();
      formData.append("file", file);
      formData.append("language", language);
      res = await fetch(`${API_BASE}/meetings/upload`, { method: "POST", body: formData });
    }
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const data = await res.json();
    meetingId = data.meeting_id;
    pollTimer = setInterval(pollMeeting, 1500);
  } catch (err) {
    document.getElementById("status-line").textContent = `Couldn't start meeting: ${err.message}`;
    document.getElementById("status-line").classList.add("error");
    document.getElementById("run-btn").disabled = false;
  }
}

async function pollMeeting(){
  try {
    const res = await fetch(`${API_BASE}/meetings/${meetingId}`);
    if (!res.ok) throw new Error(`Server responded ${res.status}`);
    const meeting = await res.json();
    renderReel(meeting.status);

    if (meeting.status === "error") {
      clearInterval(pollTimer);
      document.getElementById("status-line").textContent = `Failed: ${meeting.error}`;
      document.getElementById("status-line").classList.add("error");
      document.getElementById("run-btn").disabled = false;
      return;
    }

    if (meeting.status === "done") {
      clearInterval(pollTimer);
      document.getElementById("status-line").textContent = "Done.";
      document.getElementById("run-btn").disabled = false;
      renderResult(meeting.result);
      return;
    }

    document.getElementById("status-line").textContent = `Status: ${meeting.status.replace(/_/g," ")}…`;
  } catch (err) {
    clearInterval(pollTimer);
    document.getElementById("status-line").textContent = `Lost connection: ${err.message}`;
    document.getElementById("status-line").classList.add("error");
    document.getElementById("run-btn").disabled = false;
  }
}

function fillList(id, items){
  const ul = document.getElementById(id);
  ul.innerHTML = "";
  const arr = Array.isArray(items) ? items : (items ? [items] : []);
  if (arr.length === 0) {
    ul.innerHTML = `<li style="color:var(--ink-dim);">None found.</li>`;
    return;
  }
  arr.forEach(item => {
    const li = document.createElement("li");
    li.textContent = typeof item === "string" ? item : JSON.stringify(item);
    ul.appendChild(li);
  });
}

function renderResult(result){
  document.getElementById("results-panel").classList.remove("hidden");
  document.getElementById("chat-panel").classList.remove("hidden");
  document.getElementById("result-title").textContent = result.title || "Untitled recording";
  document.getElementById("result-summary").textContent = result.summary || "—";
  fillList("result-actions", result.action_items);
  fillList("result-decisions", result.key_decisions);
  fillList("result-questions", result.open_questions);
  document.getElementById("result-transcript").textContent = result.transcript || "";
  document.getElementById("chat-log").innerHTML = "";
}

async function sendChat(){
  const input = document.getElementById("chat-input");
  const question = input.value.trim();
  if (!question || !meetingId) return;
  input.value = "";
  appendChat("user", question);

  try {
    const res = await fetch(`${API_BASE}/meetings/${meetingId}/ask`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({question})
    });
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      throw new Error(errBody.detail || `Server responded ${res.status}`);
    }
    const data = await res.json();
    appendChat("assistant", data.answer);
  } catch (err) {
    appendChat("assistant", `Couldn't get an answer: ${err.message}`);
  }
}

function appendChat(role, text){
  const log = document.getElementById("chat-log");
  const div = document.createElement("div");
  div.className = `msg ${role}`;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}
</script>
</body>
</html>
